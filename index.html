<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMR.gg - Secure Connection</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3785370259549065" crossorigin="anonymous"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
            user-select: none;
            background: radial-gradient(circle, rgba(0,30,0,0.2) 0%, rgba(0,0,0,1) 70%);
        }

        h1 {
            font-size: 6rem;
            margin: 0;
            letter-spacing: 15px;
            font-weight: bold;
            position: relative;
            animation: glitch 1s linear infinite;
        }

        h1::before, h1::after {
            content: "DMR.gg";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
        }

        h1::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        h1::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-top: 20px;
            opacity: 0.8;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            20% { clip: rect(62px, 9999px, 42px, 0); }
            40% { clip: rect(15px, 9999px, 86px, 0); }
            60% { clip: rect(10px, 9999px, 47px, 0); }
            80% { clip: rect(81px, 9999px, 31px, 0); }
            100% { clip: rect(45px, 9999px, 98px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(11px, 9999px, 55px, 0); }
            40% { clip: rect(82px, 9999px, 10px, 0); }
            60% { clip: rect(43px, 9999px, 78px, 0); }
            80% { clip: rect(91px, 9999px, 20px, 0); }
            100% { clip: rect(21px, 9999px, 66px, 0); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 3.5rem; letter-spacing: 5px; }
            .subtitle { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <div class="container">
        <h1>DMR.gg</h1>
        <div class="subtitle">root@DMR.gg:~#</div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ锟斤拷烫';
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Recalculate columns on resize
            const newColumns = canvas.width / fontSize;
            if (newColumns > drops.length) {
                for (let i = drops.length; i < newColumns; i++) {
                    drops[i] = 1;
                }
            }
        });

        setInterval(draw, 33);
    </script>
</body>
</html>
